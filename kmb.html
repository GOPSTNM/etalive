<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB Arrival Time</title>
    <link rel="stylesheet" href="style.css">
    <script src="script_kmb.js" defer></script>
  </head>
  <body>
    <h1>KMB Arrival Time</h1>
    <p>Please input route and select direction.</p>

    <div id="results"></div>
    <p class="text_desc">The information is provided by the Digital Policy Office and for reference only.</p>
    <dialog id="stop_eta_disp" onclick="window_disp_click(event);" class="window_disp">
      <div id="stop_eta_disp_elem" class="window_disp_elem"></div>
    </dialog>
  </body>
</html>
